backend:
  name: git-gateway
  branch: main

media_folder: "/astro/public/images"
public_folder: "/images"

collections:
  - name: "pages_en"
    label: "Pages (EN)"
    folder: "astro/src/pages/en"
    create: true
    slug: "{{title}}"

    nested:
      depth: 10
      summary: "{{title}}"
      subfolders: true

    meta:
      path:
        widget: string
        label: "Path"
        index_file: "index"

    fields: &pageFields
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "/src/layouts/MDLayout.astro"

      - label: "Language"
        name: "lang"
        widget: "hidden"
        default: "en"

      - label: "Section Title (if more than 1 items in a group)"
        name: "sectionTitle"
        required: true
        widget: "string"

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Alt Text", name: "alt", widget: "string" }

      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text"]
        required: false

  - name: "pages_lv"
    label: "Pages (LV)"
    folder: "astro/src/pages/lv"
    create: true
    slug: "{{title}}"

    nested:
      depth: 10
      summary: "{{title}}"
      subfolders: true

    meta:
      path:
        widget: string
        label: "Path"
        index_file: "index"

    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "/src/layouts/MDLayout.astro"

      - label: "Language"
        name: "lang"
        widget: "hidden"
        default: "lv"

      - label: "Section Title (if more than 1 items in a group)"
        name: "sectionTitle"
        required: true
        widget: "string"

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Alt Text", name: "alt", widget: "string" }

      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text"]
        required: false
